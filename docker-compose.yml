services:
  gateway:
    build: .
    image: multiflow-ai-gateway:latest
    container_name: multiflow-ai-gateway
    ports:
      - "${PORT:-13000}:13000"
    env_file:
      - .env
    volumes:
      - gateway_data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
        reservations:
          memory: 256m
          cpus: "0.25"

volumes:
  gateway_data:
